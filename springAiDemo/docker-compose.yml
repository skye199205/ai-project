# 向量库依赖：Chroma（/api/rag）+ PostgreSQL pgvector（/api/pg-rag）
# 启动：docker compose up -d
# 停止：docker compose down
services:
  chroma:
    image: chromadb/chroma:latest
    container_name: spring-ai-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  postgres:
    image: pgvector/pgvector:pg16
    container_name: spring-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spring_ai_demo
    # 避免与本机已有 postgres（如 my-postgres:5432）冲突
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spring_ai_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chroma_data:
  pg_data:
