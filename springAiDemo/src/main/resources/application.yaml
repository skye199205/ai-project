spring:
  application:
    name: springAiDemo
  # PostgreSQL（pgvector，供 /api/pg-rag 使用；与 Chroma 并存）
  datasource:
    # 使用 docker compose 中的 pgvector/pgvector（映射 5433）；勿连无 vector 扩展的普通 PG
    url: jdbc:postgresql://localhost:5433/spring_ai_demo
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # 加载 application-local.yaml（存放 DashScope API Key，已加入 .gitignore）
  profiles:
    include:
      - local
  ai:
    # Chroma 1.x：请自行先用 Docker（或其它方式）拉起 HTTP 服务，再启动本应用；Spring 只连下方 client。
    # 端口默认 8000；若改了映射端口，请同步修改 client.port。
    # Chroma Cloud：client.host=api.trychroma.com、port=443、key-token=...，并改写 tenant/database。
    vectorstore:
      type: chroma
      chroma:
        initialize-schema: true
        tenant-name: SpringAiTenant
        database-name: SpringAiDatabase
        collection-name: spring-aidemo-collection
        client:
          host: http://localhost
          port: 8000
    openai:
      # DashScope OpenAI 兼容：不要带末尾 /v1（Spring AI 会拼接 chat.completions-path，默认 /v1/chat/completions）
      # 北京地域；国际区示例：https://dashscope-intl.aliyuncs.com/compatible-mode
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          # 通义模型（DashScope 模型名以控制台/文档为准）
          model: qwen3.6-plus
      # 与聊天共用 base-url、api-key；向量维度随模型变化，请与百炼控制台一致
      embedding:
        options:
          model: text-embedding-v3
    # RAG 检索参数（QuestionAnswerAdvisor）
    rag:
      top-k: 4
      similarity-threshold: 0.6
      # 混合召回（/api/rag/ask/hybrid）：向量路 + 关键词路 + RRF
      hybrid:
        vector-top-k: 8
        keyword-top-k: 8
        final-top-k: 6
        similarity-threshold: 0.5
        rrf-k: 60
      # 长文自动分块（TokenTextSplitter，单位为 token 估算）
      chunk-size: 800
      min-chunk-size-chars: 350
      # PostgreSQL pgvector（需与 DashScope text-embedding-v3 维度一致，常见为 1024）
      pgvector:
        dimensions: 1024
        table-name: spring_ai_demo_pg_store
    # DashScope 托管 MCP（高德地图等）。鉴权与 OpenAI 兼容接口共用同一把 DashScope API Key（见 application-local.yaml）。
    mcp:
      client:
        type: SYNC
        streamable-http:
          connections:
            # 与 Cursor mcpServers 中 streamableHttp / url 等价：基址 + 路径拆分为 url + endpoint
            amap-maps:
              url: https://dashscope.aliyuncs.com
              endpoint: /api/v1/mcps/amap-maps/mcp

# 是否启用 PostgreSQL pgvector 一套（false 时仅使用 Chroma，且不连接 PG）
app:
  pgvector:
    enabled: true

server:
  port: 8091
